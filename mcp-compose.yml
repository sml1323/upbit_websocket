version: '3.8'

services:
  # MCP Server (Go 개발 환경 포함)
  mcp-server:
    build:
      context: ./db-mcp-server
      dockerfile: Dockerfile
    container_name: upbit-mcp-server
    ports:
      - "9093:9092"
    environment:
      - CONFIG_PATH=/app/config.upbit.json
      - LOG_LEVEL=debug
    volumes:
      - ./db-mcp-server/config.upbit.json:/app/config.upbit.json
      - ./db-mcp-server:/app/src
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - upbit-network
    restart: unless-stopped

  # TimescaleDB (기존 설정 재사용)
  timescaledb:
    image: timescale/timescaledb:2.14.2-pg13
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: upbit_user
      POSTGRES_PASSWORD: upbit_password
      POSTGRES_DB: upbit_analytics
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "upbit_user", "-d", "upbit_analytics"]
      interval: 10s
      retries: 5
      start_period: 30s
    networks:
      - upbit-network
    restart: unless-stopped

  # Kafka (기존 설정)
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - upbit-network
    restart: unless-stopped

  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_PORT: 9092
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - zookeeper
    networks:
      - upbit-network
    restart: unless-stopped

networks:
  upbit-network:
    driver: bridge

volumes:
  timescaledb-data: