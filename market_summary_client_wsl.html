<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 시장 요약 (WSL용)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: #ffffff;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #4CAF50;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-indicator.connected {
            background: #4CAF50;
        }
        
        .status-indicator.disconnected {
            background: #f44336;
        }
        
        .summary-container {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .timestamp {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        
        .summary-text {
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 15px;
        }
        
        .market-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-item {
            background: #3d3d3d;
            padding: 10px;
            border-radius: 6px;
        }
        
        .stat-label {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .positive {
            color: #4CAF50;
        }
        
        .negative {
            color: #f44336;
        }
        
        .neutral {
            color: #ffa726;
        }
        
        .loading {
            text-align: center;
            color: #888;
            padding: 40px;
        }
        
        .connection-info {
            background: #3d3d3d;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 실시간 시장 요약 (WSL 버전)</h1>
        
        <div class="connection-info">
            <p><strong>연결 정보:</strong></p>
            <p>WebSocket: <span id="ws-url">ws://172.31.65.200:8765</span></p>
            <p>상태: <span id="connection-status">연결 중...</span></p>
        </div>
        
        <div class="status">
            <div style="display: flex; align-items: center;">
                <div id="status-indicator" class="status-indicator disconnected"></div>
                <span id="status-text">연결 중...</span>
            </div>
            <div id="last-update">업데이트 대기 중</div>
        </div>
        
        <div id="summary-content" class="loading">
            실시간 시장 데이터를 로딩 중입니다...
        </div>
    </div>

    <script>
        let socket;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        
        function connect() {
            const wsUrl = 'ws://172.31.65.200:8765';
            document.getElementById('ws-url').textContent = wsUrl;
            
            socket = new WebSocket(wsUrl);
            
            socket.onopen = function(event) {
                console.log('WebSocket 연결됨');
                document.getElementById('status-indicator').className = 'status-indicator connected';
                document.getElementById('status-text').textContent = '연결됨';
                document.getElementById('connection-status').textContent = '연결됨';
                reconnectAttempts = 0;
            };
            
            socket.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    updateSummary(data);
                } catch (e) {
                    console.error('메시지 파싱 오류:', e);
                }
            };
            
            socket.onclose = function(event) {
                console.log('WebSocket 연결 종료');
                document.getElementById('status-indicator').className = 'status-indicator disconnected';
                document.getElementById('status-text').textContent = '연결 끊어짐';
                document.getElementById('connection-status').textContent = '연결 끊어짐';
                
                // 자동 재연결
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    console.log(`재연결 시도 ${reconnectAttempts}/${maxReconnectAttempts}`);
                    setTimeout(connect, 3000);
                }
            };
            
            socket.onerror = function(error) {
                console.error('WebSocket 오류:', error);
                document.getElementById('connection-status').textContent = '연결 오류';
            };
        }
        
        function updateSummary(data) {
            document.getElementById('last-update').textContent = `마지막 업데이트: ${new Date().toLocaleTimeString()}`;
            
            const container = document.getElementById('summary-content');
            container.innerHTML = `
                <div class="summary-container">
                    <div class="timestamp">
                        📅 ${new Date(data.timestamp).toLocaleString('ko-KR')}
                    </div>
                    
                    <div class="summary-text">
                        ${data.summary || '시장 요약 데이터 로딩 중...'}
                    </div>
                    
                    <div class="market-stats">
                        <div class="stat-item">
                            <div class="stat-label">활성 코인 수</div>
                            <div class="stat-value">${data.total_coins || 0}개</div>
                        </div>
                        
                        <div class="stat-item">
                            <div class="stat-label">상승 코인</div>
                            <div class="stat-value positive">${data.rising_coins || 0}개</div>
                        </div>
                        
                        <div class="stat-item">
                            <div class="stat-label">하락 코인</div>
                            <div class="stat-value negative">${data.falling_coins || 0}개</div>
                        </div>
                        
                        <div class="stat-item">
                            <div class="stat-label">평균 변화율</div>
                            <div class="stat-value ${data.avg_change_rate > 0 ? 'positive' : data.avg_change_rate < 0 ? 'negative' : 'neutral'}">
                                ${data.avg_change_rate ? data.avg_change_rate.toFixed(2) : '0.00'}%
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 페이지 로드 시 연결 시작
        connect();
    </script>
</body>
</html>
